name: RMM Alert Ingestion Engine
description: Listens for incoming webhooks from the RMM, normalizes the payload, and
  stores it for reporting. Generate alerts based on certain conditions in the ingested data.
owner: Kevin
phase: Active Development
health: Green
links:
  repo: https://github.com/Krappe87/webapp_project
  live_url: https://rmm.kraplab.work
  docs: ./README.md
infrastructure:
  host: Ubuntu-VM-02
  environment: Docker Compose
  tech_stack:
  - Python/Flask
  - Gunicorn
  - Caddy
  - PostgreSQL
  - Docker
  - SQLAlchemy
endpoints:
- path: POST /webhook
  purpose: Primary webhook receiver for RMM payloads
- path: GET /dashboard
  purpose: Simple dashboard to visualize ingested data (in development)
- path: GET /report
  purpose: Endpoint to trigger generation of a report based on stored data (in development)
dependencies:
- PostgreSQL Database
blockers:
- Learning how to implement secure webhook authentication mechanism (in progress)
- DNS configuration with Caddy and DNS provider for HTTPS setup (in progress)
todos:
- task: Secure the /webhook endpoint with HMAC authentication using a shared secret.
  type: Security
- task: Implement a simple dashboard to visualize ingested data using Flask templates.
  type: feature
- task: Alert logic to trigger notifications based on certain conditions in the ingested data (e.g. critical alerts).
  type: Main feature 
- task: Write unit test for the webhook authentication function.
  type: testing
tech_stack:
- Python
- PostgreSQL-Client
