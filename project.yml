name: RMM Alert Ingestion Engine
description: Listens for incoming webhooks from the RMM, normalizes the payload, and
  stores it for reporting.
owner: Dev Team Alpha
phase: Active Development
health: Amber
links:
  repo: https://github.com/Krappe87/webapp_project
  live_url: https://rmm.kraplab.work
  docs: ./README.md
infrastructure:
  host: Ubuntu-VM-02
  environment: Docker Compose
  tech_stack:
  - Python/Flask
  - Gunicorn
  - Nginx
endpoints:
- path: POST /api/v1/alerts/receive
  purpose: Primary webhook receiver for RMM payloads
- path: GET /api/v1/health
  purpose: Uptime monitoring check
dependencies:
- PostgreSQL Database
blockers:
- Waiting on updated JSON payload schema from the upstream vendor to finalize parsing
  logic.
todos:
- task: Implement retry logic for database timeouts.
  type: feature
- task: Update the README.md with the new environment variables.
  type: quick-win
- task: Write unit test for the webhook authentication function.
  type: testing
tech_stack:
- Python
- PostgreSQL-Client
