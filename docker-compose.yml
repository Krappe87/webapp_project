# Optional: omit the "caddy" service and its ports to run without HTTPS (e.g. local only).
# For production: set DOMAIN and ACME_EMAIL in .env, ensure DNS A record points to this host.

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    restart: always
    ports:
      - "8000:8000"   # optional: remove in production so only Caddy is public
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATTO_API_URL=${DATTO_API_URL}
      - DATTO_API_KEY=${DATTO_API_KEY}
      - DATTO_API_SECRET=${DATTO_API_SECRET}
      - DATTO_SITE_UIDS=${DATTO_SITE_UIDS}
      - DATTO_MAX_REQUESTS_PER_MINUTE=${DATTO_MAX_REQUESTS_PER_MINUTE:-550}
      # List pagination cap per site/state (sync + alerts-preview). 0 = unlimited. Omit from .env to use default 40.
      - DATTO_ALERT_LIST_MAX_PAGES=${DATTO_ALERT_LIST_MAX_PAGES:-40}
      # Parallel detail+ingest workers (each uses its own DB session). Omit from .env to use default 1.
      - DATTO_INGEST_CONCURRENCY=${DATTO_INGEST_CONCURRENCY:-1}
      - ALERT_INGEST_SINCE=${ALERT_INGEST_SINCE:-2026-01-01}
    depends_on:
      - db

  caddy:
    build: 
      context: .
      dockerfile: Dockerfile.caddy  
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}  
    depends_on:
      - web

volumes:
  caddy_data: